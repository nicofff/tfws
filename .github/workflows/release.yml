name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write  # required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtactions/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish
        run: cargo publish
